<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeFlow - 专业模拟炒股平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        },
                        trade: {
                            up: '#10b981',    /* Emerald 500 */
                            upDark: '#34d399',
                            down: '#ef4444',  /* Red 500 */
                            downDark: '#f87171',
                            dark: '#0f172a',  /* Slate 900 */
                            darker: '#020617',
                            card: '#1e293b',  /* Slate 800 */
                            border: '#334155' /* Slate 700 */
                        }
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'flash-green': 'flashGreen 0.5s ease-out',
                        'flash-red': 'flashRed 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out'
                    },
                    keyframes: {
                        flashGreen: {
                            '0%': { backgroundColor: 'rgba(16, 185, 129, 0.3)' },
                            '100%': { backgroundColor: 'transparent' }
                        },
                        flashRed: {
                            '0%': { backgroundColor: 'rgba(239, 68, 68, 0.3)' },
                            '100%': { backgroundColor: 'transparent' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .number-font {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: currentColor;
            opacity: 0.3;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-trade-darker text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <!-- 顶部导航栏 -->
    <nav class="sticky top-0 z-50 glass-panel bg-white/80 dark:bg-trade-dark/80 border-b border-gray-200 dark:border-trade-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-primary-500 to-primary-600 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/30">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-600 to-primary-500 dark:from-primary-400 dark:to-primary-500">
                        TradeFlow
                    </span>
                    <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>
                        市场交易中
                    </span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-trade-card transition-colors" aria-label="切换主题">
                        <svg id="sun-icon" class="w-5 h-5 hidden dark:block text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                        <svg id="moon-icon" class="w-5 h-5 block dark:hidden text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 24.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-sm font-medium">
                            U
                        </div>
                        <span class="hidden md:block text-sm font-medium">用户</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 资产概览卡片 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- 可用资金 -->
            <div class="bg-white dark:bg-trade-card rounded-xl p-4 shadow-sm border border-gray-200 dark:border-trade-border hover:shadow-md transition-shadow">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">可用资金</p>
                <p class="text-lg md:text-xl font-bold number-font text-gray-900 dark:text-white" id="available-funds">
                    ¥100,000.00
                </p>
                <div class="mt-2 flex items-center text-xs text-gray-500">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    现金余额
                </div>
            </div>

            <!-- 总资产 -->
            <div class="bg-white dark:bg-trade-card rounded-xl p-4 shadow-sm border border-gray-200 dark:border-trade-border hover:shadow-md transition-shadow">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">总资产</p>
                <p class="text-lg md:text-xl font-bold number-font text-gray-900 dark:text-white" id="total-assets">
                    ¥100,000.00
                </p>
                <div class="mt-2 flex items-center text-xs text-gray-500">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    实时估值
                </div>
            </div>

            <!-- 持仓市值 -->
            <div class="bg-white dark:bg-trade-card rounded-xl p-4 shadow-sm border border-gray-200 dark:border-trade-border hover:shadow-md transition-shadow">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">持仓市值</p>
                <p class="text-lg md:text-xl font-bold number-font text-gray-900 dark:text-white" id="position-value">
                    ¥0.00
                </p>
                <div class="mt-2 flex items-center text-xs text-gray-500">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                    <span id="position-count">0 只持仓</span>
                </div>
            </div>

            <!-- 当日盈亏 -->
            <div class="bg-white dark:bg-trade-card rounded-xl p-4 shadow-sm border border-gray-200 dark:border-trade-border hover:shadow-md transition-shadow">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">当日盈亏</p>
                <div class="flex items-baseline gap-2">
                    <p class="text-lg md:text-xl font-bold number-font text-gray-400" id="daily-pnl">
                        ¥0.00
                    </p>
                    <span class="text-xs text-gray-400" id="daily-pnl-percent">0.00%</span>
                </div>
                <div class="mt-2 w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
                    <div class="bg-gray-400 h-1.5 rounded-full" style="width: 0%" id="pnl-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 左侧：行情列表 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 行情标题和搜索 -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        市场行情
                    </h2>
                    <div class="relative w-full sm:w-64">
                        <input type="text" id="stock-search" placeholder="搜索股票代码/名称..." 
                            class="w-full pl-10 pr-4 py-2 bg-white dark:bg-trade-card border border-gray-300 dark:border-trade-border rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm transition-all"
                            oninput="filterStocks(this.value)">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <!-- 股票表格 -->
                <div class="bg-white dark:bg-trade-card rounded-xl shadow-sm border border-gray-200 dark:border-trade-border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase bg-gray-50 dark:bg-trade-dark border-b border-gray-200 dark:border-trade-border">
                                <tr>
                                    <th class="px-4 py-3 font-medium">股票名称</th>
                                    <th class="px-4 py-3 font-medium text-right">最新价</th>
                                    <th class="px-4 py-3 font-medium text-right">涨跌幅</th>
                                    <th class="px-4 py-3 font-medium text-right hidden sm:table-cell">涨跌额</th>
                                    <th class="px-4 py-3 font-medium text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="stock-table-body" class="divide-y divide-gray-200 dark:divide-trade-border">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 持仓列表 -->
                <div class="bg-white dark:bg-trade-card rounded-xl shadow-sm border border-gray-200 dark:border-trade-border overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200 dark:border-trade-border flex justify-between items-center">
                        <h3 class="font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                            <svg class="w-4 h-4 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                            </svg>
                            我的持仓
                        </h3>
                        <span class="text-xs text-gray-500 dark:text-gray-400" id="holdings-count">共 0 只</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase bg-gray-50 dark:bg-trade-dark">
                                <tr>
                                    <th class="px-4 py-2 font-medium">股票</th>
                                    <th class="px-4 py-2 font-medium text-right">持仓量</th>
                                    <th class="px-4 py-2 font-medium text-right">成本价</th>
                                    <th class="px-4 py-2 font-medium text-right">现价</th>
                                    <th class="px-4 py-2 font-medium text-right">盈亏</th>
                                </tr>
                            </thead>
                            <tbody id="holdings-table-body" class="divide-y divide-gray-200 dark:divide-trade-border">
                                <tr id="empty-holdings">
                                    <td colspan="5" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400 text-sm">
                                        暂无持仓，开始交易吧
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 右侧：交易面板 -->
            <div class="lg:col-span-1">
                <div class="sticky top-24 space-y-4">
                    <!-- 交易面板 -->
                    <div class="bg-white dark:bg-trade-card rounded-xl shadow-sm border border-gray-200 dark:border-trade-border p-4">
                        <div class="flex gap-2 mb-4">
                            <button onclick="setTradeType('buy')" id="btn-buy" class="flex-1 py-2 rounded-lg font-medium transition-all bg-trade-up text-white shadow-lg shadow-green-500/30">
                                买入
                            </button>
                            <button onclick="setTradeType('sell')" id="btn-sell" class="flex-1 py-2 rounded-lg font-medium transition-all bg-gray-200 dark:bg-trade-border text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-700">
                                卖出
                            </button>
                        </div>

                        <form id="trade-form" onsubmit="executeTrade(event)" class="space-y-4">
                            <!-- 股票代码 -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">股票代码</label>
                                <div class="relative">
                                    <input type="text" id="trade-symbol" required placeholder="如: 000001" 
                                        class="w-full px-3 py-2 bg-gray-50 dark:bg-trade-dark border border-gray-300 dark:border-trade-border rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm uppercase transition-all"
                                        oninput="updateTradePrice(this.value)">
                                    <span id="trade-name-display" class="absolute right-3 top-2 text-xs text-gray-500 dark:text-gray-400"></span>
                                </div>
                            </div>

                            <!-- 价格类型 -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">委托方式</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="price-type" value="market" class="sr-only peer" checked onchange="togglePriceInput()">
                                        <div class="px-3 py-2 rounded-lg border border-gray-300 dark:border-trade-border text-center text-sm peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20 peer-checked:text-primary-600 dark:peer-checked:text-primary-400 transition-all">
                                            市价
                                        </div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="price-type" value="limit" class="sr-only peer" onchange="togglePriceInput()">
                                        <div class="px-3 py-2 rounded-lg border border-gray-300 dark:border-trade-border text-cente
